<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Infinite Stairs - Degu Edition</title>

<style>

html,body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameWrap{
    position:relative;
    width:min(100vw,500px);
}

canvas{
    display:block;
    width:100%;
    height:auto;
    background:#222;
    border:1px solid #555;
}

#controls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:flex;
    justify-content:space-between;

    padding:0 16px;
    box-sizing:border-box;
}

#gameOverControls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:none;
    justify-content:center;
}

button{

    width:120px;
    height:70px;

    border-radius:14px;

    border:2px solid rgba(255,255,255,.5);

    background:rgba(255,255,255,.15);

    color:white;

    font-size:24px;
    font-weight:bold;

    backdrop-filter:blur(4px);

    touch-action:manipulation;
}

button:active{
    background:rgba(255,255,255,.3);
}

</style>
</head>
<body>

<div id="gameWrap">

    <canvas id="c"
            width="500"
            height="600"></canvas>

    <div id="controls">
        <button id="turnBtn">TURN</button>
        <button id="goBtn">GO</button>
    </div>

    <div id="gameOverControls">
        <button id="restartBtn">RESTART</button>
    </div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- 【新規追加】画像の読み込み ---
const deguLImg = new Image();
deguLImg.src = 'kuku_l.png';  // 左向き画像のパス

const deguRImg = new Image();
deguRImg.src = 'kuku_r.png';  // 右向き画像のパス

// 画像が読み込まれるまでゲームの描画を待つ必要はありません。
// draw()が呼ばれたときに読み込まれていれば描画されます。
// --- 画像の読み込みここまで ---

let facing;
let score;
let bestScore;
let gameOver;
let path;

let timeLeft;
let startTime;

function updateButtons(){

    if(gameOver){

        document
            .getElementById("controls")
            .style.display = "none";

        document
            .getElementById("gameOverControls")
            .style.display = "flex";

    }else{

        document
            .getElementById("controls")
            .style.display = "flex";

        document
            .getElementById("gameOverControls")
            .style.display = "none";
    }
}

function reset(){

    bestScore =
        Number(
            localStorage.getItem("bestScore") || 0
        );

    facing = 1;
    score = 0;
    gameOver = false;

    timeLeft = 30;
    startTime = Date.now();

    path = [0];

    for(let i=0;i<100;i++){

        const last = path[path.length-1];

        path.push(
            last +
            (Math.random()<0.5 ? -1 : 1)
        );
    }

    updateButtons();
}

function finishGame(){

    if(score > bestScore){

        bestScore = score;

        localStorage.setItem(
            "bestScore",
            score
        );
    }

    gameOver = true;

    updateButtons();
}

function move(turn){

    if(gameOver){
        return;
    }

    let moveDir;

    if(turn){

        facing *= -1;
        moveDir = facing;

    }else{

        moveDir = facing;
    }

    const dx = path[1] - path[0];

    if(dx !== moveDir){

        finishGame();
        return;
    }

    score++;

    path.shift();

    const last =
        path[path.length-1];

    path.push(
        last +
        (Math.random()<0.5 ? -1 : 1)
    );
}

reset();

document.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        e.preventDefault();

        move(false);
    }
    else if(
        e.code==="ControlLeft" ||
        e.code==="ControlRight"
    ){

        move(true);
    }
});

document
.getElementById("goBtn")
.addEventListener(
    "click",
    ()=>move(false)
);

document
.getElementById("turnBtn")
.addEventListener(
    "click",
    ()=>move(true)
);

document
.getElementById("restartBtn")
.addEventListener(
    "click",
    reset
);

function draw(){

    if(!gameOver){

        timeLeft =
            Math.max(
                0,
                30 -
                (
                    Date.now()
                    -
                    startTime
                ) / 1000
            );

        if(timeLeft <= 0){

            finishGame();
        }
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const centerX = 250;
    const playerY = 450;

    // 階段の描画
    for(let i=0;i<12;i++){

        const x =
            centerX +
            (
                path[i]
                -
                path[0]
            ) * 50;

        const y =
            playerY
            -
            i * 40;

        ctx.strokeStyle = "cyan";

        ctx.strokeRect(
            x - 25,
            y - 8,
            50,
            16
        );
    }

    // --- 【修正】画像の描画処理 ---
    
    // 現在の向き（facing）に応じて描画する画像を選択
    // facing が -1 (左向き) なら deguLImg、1 (右向き) なら deguRImg
    const pImg = facing === -1 ? deguLImg : deguRImg;
    
    // 画像のサイズ（お好みに合わせて調整してください）
    const pSize = 48; // 例：縦横48ピクセル

    // 画像を描画
    // drawImage(image, x, y, width, height)
    // 階段の中央にキャラクターが来るように、centerX と playerY を調整します。
    // 画像の「下端の中央」を、プレイヤーの位置（階段の上）に合わせます。
    ctx.drawImage(
        pImg,
        centerX - pSize / 2,         // 横位置（centerXから幅の半分を引いて中央寄せ）
        playerY - pSize + 8,        // 縦位置（playerYから高さを引いて上に乗せる。階段に食い込まないように +8で微調整）
        pSize,                      // 幅
        pSize                       // 高さ
    );
    // --- 画像の描画処理ここまで ---

    // スコアなどの情報表示
    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";

    ctx.fillText(
        "Score: " + score,
        20,
        40
    );

    ctx.fillText(
        "Time: " +
        timeLeft.toFixed(1),
        20,
        75
    );

    ctx.fillText(
        "Best: " +
        bestScore,
        20,
        110
    );

    if(gameOver){

        ctx.fillStyle = "red";

        ctx.font =
            "40px sans-serif";

        ctx.fillText(
            "TIME UP",
            145,
            240
        );

        ctx.font =
            "28px sans-serif";

        ctx.fillText(
            "Score : " + score,
            160,
            290
        );

        ctx.fillText(
            "Best : " + bestScore,
            160,
            330
        );
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
