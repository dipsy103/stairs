<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Kuku's Stairs - Degu Edition</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
html,body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
#gameWrap{
    position:relative;
    width:min(100vw,500px);
}
canvas{
    display:block;
    width:100%;
    height:auto;
    background:#111526;
    border:1px solid #555;
}
#controls, #startControls, #gameOverControls, #nameInputWrap, #rankingBoard{
    position:absolute;
    left:0;
    right:0;
    box-sizing:border-box;
}
#controls{ bottom:16px; display:none; justify-content:space-between; padding:0 16px; }
#startControls { bottom:16px; display:flex; justify-content:center; }
#gameOverControls{ bottom:16px; display:none; justify-content:center; gap:10px; }

/* 名前入力画面のスタイル */
#nameInputWrap {
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(16, 20, 38, 0.95); border: 2px solid cyan; border-radius: 14px;
    padding: 20px; width: 280px; text-align: center; color: white; display: none; z-index: 10;
}
#nameInputWrap input {
    width: 80%; padding: 8px; font-size: 18px; text-align: center; margin: 15px 0;
    border-radius: 6px; border: 1px solid #555; background: #222; color: white;
}

/* ランキングボードのスタイル */
#rankingBoard {
    top: 60px; left: 50%; transform: translateX(-50%);
    width: 320px; max-height: 240px; background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
    color: white; font-size: 14px; padding: 10px; overflow-y: auto; display: none; z-index: 5;
}
.rank-row { display: flex; justify-content: space-between; margin: 4px 0; border-bottom: 1px dashed #333; }

button{
    width:120px; height:70px; border-radius:14px;
    border:2px solid rgba(255,255,255,.5); background:rgba(255,255,255,.15);
    color:white; font-size:24px; font-weight:bold; backdrop-filter:blur(4px);
    touch-action:manipulation; -webkit-user-select: none; user-select: none;
}
button:active{ background:rgba(255,255,255,.3); }
#rankingBtn { width: auto; height: 40px; font-size: 14px; padding: 0 15px; position: absolute; top: 15px; right: 15px; border-radius: 8px; }
</style>
</head>
<body>

<div id="gameWrap">
    <canvas id="c" width="500" height="600"></canvas>

    <button id="rankingBtn">RANKING</button>

    <div id="nameInputWrap">
        <h3 style="margin:0;">NEW RECORD!</h3>
        <p style="font-size:14px; margin:5px 0;">名前を入力（最大6文字）</p>
        <input type="text" id="playerNameInput" maxlength="6" placeholder="DEGU">
        <button id="saveNameBtn" style="width:100px; height:40px; font-size:16px; border-radius:8px;">OK</button>
    </div>

    <div id="rankingBoard">
        <div style="text-align:center; font-weight:bold; color:cyan; margin-bottom:8px;">🏆 TOP 20 RANKING</div>
        <div id="rankingList"></div>
    </div>

    <div id="startControls"><button id="startBtn">START</button></div>
    <div id="controls">
        <button id="turnBtn">TURN</button>
        <button id="goBtn">GO</button>
    </div>
    <div id="gameOverControls"><button id="restartBtn">RESTART</button></div>
</div>

<script>
// --- 【重要】デプロイ時にローカルの.envから自動置換されるプレースホルダー ---
const firebaseConfig = {
  apiKey: "AIzaSyCzTL9IAcunkY66tz3j_Z15lRwiC4J0j4g",
  authDomain: "kuku-stairs.firebaseapp.com",
  projectId: "kuku-stairs"
};

// Firebaseの初期化
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const POTATO_CHANCE = 0.05;      
const CHAPPIE_CHANCE = 0.01;     
const CHAPPIE_BONUS_SCORE = 30;  
const MAX_AHEAD_STAIRS = 20;     

// 画像読み込み
const deguLImg = new Image(); deguLImg.src = 'kuku_l.png';
const deguRImg = new Image(); deguRImg.src = 'kuku_r.png';
const potatoImg = new Image(); potatoImg.src = 'satsumaimo.png';
const chappieLImg = new Image(); chappieLImg.src = 'chappie_l.png';
const chappieRImg = new Image(); chappieRImg.src = 'chappie_r.png';
const silhouetteImg = new Image(); silhouetteImg.src = 'silhouette.png';

let facing, score, bestScore, gameOver, isStarted = false, gameOverReason = ""; 
let path, potatoPath, chappiePath, hasChappy, lastPlayerX = 0, previousStepX = 0, isJoiningTurn = false; 
let timeLeft, startTime, timeBonus = 0;
let heartActive = false, heartStartTime = 0; const HEART_DURATION = 600; 
let smokeActive = false, smokeStartTime = 0, smokeX = 0, smokeY = 0; const SMOKE_DURATION = 500; 
let flashActive = false;    
let bgStars = []; let shootingStar = null; const STAR_COUNT = 30; let targetScrollY = 0, currentScrollY = 0;  
let potatoParticles = [];
let showingRanking = false;

// 【新規追加】一度名前を入力したかを管理する永続フラグ
let hasSavedNameBefore = false;
let savedPlayerName = "DEGU";

function initStars() {
    bgStars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        bgStars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,    
            speedFactor: Math.random() * 0.1 + 0.02 
        });
    }
    shootingStar = null; targetScrollY = 0; currentScrollY = 0; potatoParticles = []; 
}

function drawCitySilhouette() {
    if (!silhouetteImg.complete || silhouetteImg.naturalWidth === 0) return;
    ctx.save();
    let cityYOffset = (currentScrollY * 0.02);
    const aspectRatio = silhouetteImg.naturalHeight / silhouetteImg.naturalWidth;
    const drawWidth = canvas.width;
    const drawHeight = drawWidth * aspectRatio;
    ctx.drawImage(silhouetteImg, 0, canvas.height - drawHeight + cityYOffset, drawWidth, drawHeight);
    ctx.restore();
}

function createPotatoParticles(x, y) {
    const count = 36; 
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.5 + 0.8; 
        potatoParticles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1.2, 
            size: Math.random() * 1.3 + 0.5, life: 1.0, decay: Math.random() * 0.02 + 0.015 
        });
    }
}

function updateButtons(){
    document.getElementById("rankingBoard").style.display = showingRanking ? "block" : "none";
    if (document.getElementById("nameInputWrap").style.display === "block") {
        document.getElementById("startControls").style.display = "none";
        document.getElementById("controls").style.display = "none";
        document.getElementById("gameOverControls").style.display = "none";
        return;
    }
    if(!isStarted){
        document.getElementById("startControls").style.display = "flex";
        document.getElementById("controls").style.display = "none";
        document.getElementById("gameOverControls").style.display = "none";
    } else if(gameOver){
        document.getElementById("startControls").style.display = "none";
        document.getElementById("controls").style.display = "none";
        document.getElementById("gameOverControls").style.display = "flex";
    } else {
        document.getElementById("startControls").style.display = "none";
        document.getElementById("controls").style.display = "flex";
        document.getElementById("gameOverControls").style.display = "none";
    }
}

function initGame(autoStart = false) {
    bestScore = Number(localStorage.getItem("bestScore") || 0);
    score = 0; gameOver = false; gameOverReason = ""; timeLeft = 30; timeBonus = 0;
    path = [0]; potatoPath = [false]; chappiePath = [false]; hasChappy = false;
    lastPlayerX = 0; previousStepX = 0; isJoiningTurn = false; heartActive = false; smokeActive = false; flashActive = false;
    showingRanking = false;
    initStars();

    for(let i=0; i < MAX_AHEAD_STAIRS; i++){
        const last = path[path.length-1];
        path.push(last + (Math.random()<0.5 ? -1 : 1));
        potatoPath.push(Math.random() < POTATO_CHANCE);
        chappiePath.push(i > 5 && !chappiePath.includes(true) && Math.random() < CHAPPIE_CHANCE);
    }
    facing = path[1] - path[0];
    isStarted = autoStart;
    if (autoStart) startTime = Date.now();
    updateButtons();
}

function startGame() {
    isStarted = true; startTime = Date.now(); showingRanking = false; updateButtons();
}

// スコア送信処理
async function saveScoreToFirebase(name, finalScore) {
    if(!name) name = "DEGU";
    
    // 【修正】次回以降の自動送信用に名前を永続記憶
    savedPlayerName = name;
    hasSavedNameBefore = true;

    try {
        await db.collection("rankings").add({
            name: name,
            score: finalScore,
            date: firebase.firestore.FieldValue.serverTimestamp()
        });
        // 送信が完了したらランキングを表示
        showRankingBoard();
    } catch (e) {
        console.error("スコア保存失敗: ", e);
    }
}

// ランキング取得処理（トップ20）
async function showRankingBoard() {
    showingRanking = true;
    updateButtons();
    const listDiv = document.getElementById("rankingList");
    listDiv.innerHTML = "<div style='text-align:center;'>Loading...</div>";
    
    try {
        const snapshot = await db.collection("rankings").orderBy("score", "desc").limit(20).get();
        listDiv.innerHTML = "";
        let rank = 1;
        snapshot.forEach(doc => {
            const data = doc.data();
            const row = document.createElement("div");
            row.className = "rank-row";
            row.innerHTML = `<span>${rank}. ${data.name}</span><strong>${data.score} pts</strong>`;
            listDiv.appendChild(row);
            rank++;
        });
    } catch (e) {
        listDiv.innerHTML = "<div style='text-align:center; color:red;'>通信エラー</div>";
    }
}

function finishGame(reason){
    gameOver = true;
    gameOverReason = reason; 

    if(score > bestScore) {
        bestScore = score;
        localStorage.setItem("bestScore", score);
    }

    // 【修正】点数を確認させるため、0.6秒のウェイトを置いてからポップアップ分岐
    if(score > 0){
        setTimeout(() => {
            if (hasSavedNameBefore) {
                // すでに名前入力済みの場合は、そのまま記憶した名前で自動送信してランキングボードへ
                saveScoreToFirebase(savedPlayerName, score);
            } else {
                // 初回のみ名前入力ポップアップをアクティブにする
                document.getElementById("nameInputWrap").style.display = "block";
                updateButtons();
            }
        }, 600);
    }
    updateButtons();
}

// OKボタンを押した時の処理
document.getElementById("saveNameBtn").addEventListener("click", () => {
    const inputName = document.getElementById("playerNameInput").value.trim().toUpperCase();
    document.getElementById("nameInputWrap").style.display = "none";
    saveScoreToFirebase(inputName || "DEGU", score);
});

// RANKINGボタンの切り替え
document.getElementById("rankingBtn").addEventListener("click", () => {
    if (showingRanking) {
        showingRanking = false;
    } else {
        showRankingBoard();
    }
    updateButtons();
});

function move(turn){
    if(!isStarted || gameOver || document.getElementById("nameInputWrap").style.display === "block") return;
    const prevFacing = facing;
    let moveDir = turn ? facing * -1 : facing;
    if(turn) facing = moveDir;

    lastPlayerX = path[0] - path[1];
    if((path[1] - path[0]) !== moveDir){
        if (hasChappy) {
            hasChappy = false; smokeActive = true; smokeStartTime = Date.now();
            smokeX = 250 + (path[0] - path[1]) * 50; smokeY = 450 + 40;
            flashActive = true; facing = prevFacing; return; 
        } else { finishGame("MISS"); return; }
    }

    score++; previousStepX = path[0] - path[1]; isJoiningTurn = false; targetScrollY += 10; 
    path.shift(); potatoPath.shift(); chappiePath.shift(); 

    if (potatoPath[0]) {
        timeBonus += 3;
        createPotatoParticles(250 + (path[0] - path[1]) * 50, 450 - 15);
        potatoPath[0] = false;
    }
    if (chappiePath[0]) {
        score += CHAPPIE_BONUS_SCORE; hasChappy = true; isJoiningTurn = true; chappiePath[0] = false; 
        heartActive = true; heartStartTime = Date.now();
    }
    const last = path[path.length-1];
    path.push(last + (Math.random()<0.5 ? -1 : 1));
    potatoPath.push(Math.random() < POTATO_CHANCE);
    chappiePath.push(!hasChappy && !chappiePath.includes(true) && Math.random() < CHAPPIE_CHANCE);
}

initGame(false);

document.addEventListener("keydown",e=>{
    if (document.getElementById("nameInputWrap").style.display === "block") return;
    if(!isStarted && (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight")) { e.preventDefault(); startGame(); return; }
    if(gameOver && (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight")) { e.preventDefault(); initGame(true); return; }
    if(e.code==="Space"){ e.preventDefault(); move(false); }
    else if(e.code==="ControlLeft" || e.code==="ControlRight"){ move(true); }
});

function attachButtonEvent(btn, callback) { btn.addEventListener("pointerdown", (e) => { e.preventDefault(); callback(); }); }
attachButtonEvent(document.getElementById("startBtn"), startGame);
attachButtonEvent(document.getElementById("goBtn"), () => move(false));
attachButtonEvent(document.getElementById("turnBtn"), () => move(true));
attachButtonEvent(document.getElementById("restartBtn"), () => initGame(true)); 

function drawImageWithScale(image, targetX, targetY, baseWidth, alignBottom = true) {
    if (!image.complete || image.naturalWidth === 0) return;
    const aspectRatio = image.naturalHeight / image.naturalWidth;
    const drawWidth = baseWidth; const drawHeight = baseWidth * aspectRatio;
    ctx.drawImage(image, targetX - drawWidth / 2, alignBottom ? (targetY - drawHeight) : (targetY - drawHeight / 2), drawWidth, drawHeight);
}

function getStairColor(currentScore) {
    const hue = (180 - Math.floor(currentScore / 100) * 60 + 3600) % 360;
    return `hsl(${hue}, 100%, 50%)`;
}

function drawHeart(x, y, size) {
    ctx.beginPath(); ctx.moveTo(x, y + size / 4);
    ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
    ctx.bezierCurveTo(x - size, y + size * 0.75, x, y + size * 1.1, x, y + size * 1.3);
    ctx.bezierCurveTo(x, y + size * 1.1, x + size, y + size * 0.75, x + size, y + size / 4);
    ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
    ctx.closePath(); ctx.fill();
}

function drawSmokeCloud(x, y, progress) {
    ctx.save(); ctx.fillStyle = "rgba(240, 240, 240, " + (1 - progress) + ")"; 
    const radius = 10 + progress * 25; const offset = progress * 20;
    ctx.beginPath(); ctx.arc(x - offset, y, radius, 0, Math.PI * 2); ctx.arc(x + offset, y, radius, 0, Math.PI * 2);
    ctx.arc(x, y - offset, radius, 0, Math.PI * 2); ctx.arc(x, y + offset, radius, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
}

function draw(){
    if(isStarted && !gameOver){
        timeLeft = Math.max(0, 30 + timeBonus - (Date.now() - startTime) / 1000);
        if(timeLeft <= 0) finishGame("TIME_UP"); 
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    currentScrollY += (targetScrollY - currentScrollY) * 0.05; 

    // レイヤー1: 星空
    ctx.save();
    bgStars.forEach(star => {
        let renderY = (star.y + currentScrollY * star.speedFactor) % canvas.height;
        if (renderY < 0) renderY += canvas.height; 
        ctx.fillStyle = `rgba(255, 255, 255, ${(star.speedFactor * 0.6) + (Math.random() * 0.3)})`;
        ctx.beginPath(); ctx.arc(star.x, renderY, star.size, 0, Math.PI * 2); ctx.fill();
    });

    if (isStarted && !gameOver && !shootingStar && Math.random() < 0.001) {
        shootingStar = { x: Math.random() * canvas.width, y: Math.random() * (canvas.height / 2), dx: -(Math.random() * 8 + 6), dy: Math.random() * 8 + 6, length: Math.random() * 40 + 30, life: 1.0 };
    }
    if (shootingStar) {
        shootingStar.x += shootingStar.dx; shootingStar.y += shootingStar.dy; shootingStar.life -= 0.04; 
        if (shootingStar.life <= 0 || shootingStar.x < 0 || shootingStar.y > canvas.height) { shootingStar = null; } 
        else { ctx.strokeStyle = `rgba(255, 255, 255, ${shootingStar.life})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(shootingStar.x, shootingStar.y); ctx.lineTo(shootingStar.x - shootingStar.dx * (shootingStar.length / 10), shootingStar.y - shootingStar.dy * (shootingStar.length / 10)); ctx.stroke(); }
    }
    ctx.restore();

    // レイヤー2: シルエット
    drawCitySilhouette();

    // レイヤー3: ゲーム要素
    const centerX = 250; const playerY = 450; 
    const currentStairColor = getStairColor(score);
    if (score > 0) { ctx.strokeStyle = currentStairColor; ctx.strokeRect(centerX + previousStepX * 50 - 25, playerY + 40 - 8, 50, 16); }

    for(let i=0;i<12;i++){
        const x = centerX + (path[i] - path[0]) * 50; const y = playerY - i * 40;
        ctx.strokeStyle = currentStairColor; ctx.strokeRect(x - 25, y - 8, 50, 16);
        if (potatoPath[i]) ctx.drawImage(potatoImg, x - 12, y - 28, 24, 24);
        if (chappiePath[i]) drawImageWithScale(chappieRImg, x, y + 8, 36, true);
    }

    if (hasChappy) drawImageWithScale(facing === -1 ? chappieLImg : chappieRImg, isJoiningTurn ? centerX : centerX + previousStepX * 50, isJoiningTurn ? playerY + 8 : playerY + 40 + 8, 36, true);
    ctx.drawImage(facing === -1 ? deguLImg : deguRImg, centerX - 24, playerY - 40, 48, 48);

    if (potatoParticles.length > 0) {
        ctx.save();
        for (let i = potatoParticles.length - 1; i >= 0; i--) {
            let p = potatoParticles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life -= p.decay;
            if (p.life <= 0) potatoParticles.splice(i, 1); 
            else { ctx.fillStyle = `rgba(255, 235, 70, ${p.life})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); }
        }
        ctx.restore();
    }

    if (heartActive) {
        const elapsed = Date.now() - heartStartTime;
        if (elapsed > HEART_DURATION) heartActive = false; 
        else { const progress = elapsed / HEART_DURATION; ctx.save(); ctx.globalAlpha = progress < 0.2 ? progress / 0.2 : 1 - (progress - 0.2) / 0.8; ctx.fillStyle = "#ff4a8d"; drawHeart(centerX, (playerY - 45) - (progress * 50), 10 + progress * 8); ctx.restore(); }
    }
    if (smokeActive) { if (Date.now() - smokeStartTime > SMOKE_DURATION) smokeActive = false; else drawSmokeCloud(smokeX, smokeY - 15, (Date.now() - smokeStartTime) / SMOKE_DURATION); }

    ctx.fillStyle = "white"; ctx.font = "24px sans-serif";
    ctx.fillText("Score: " + score, 20, 40); ctx.fillText("Time: " + timeLeft.toFixed(1), 20, 75); ctx.fillText("Best: " + bestScore, 20, 110);

    if (!isStarted) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "cyan"; ctx.font = "40px sans-serif"; ctx.textAlign = "center"; ctx.fillText("Kuku's Stairs", canvas.width / 2, 220);
        ctx.fillStyle = "white"; ctx.font = "20px sans-serif"; ctx.fillText("Press START to Play", canvas.width / 2, 280); ctx.textAlign = "left"; 
    }
    if(gameOver){
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "red"; ctx.font = "40px sans-serif"; ctx.textAlign = "center"; ctx.fillText(gameOverReason === "TIME_UP" ? "TIME UP" : "GAME OVER", canvas.width / 2, 220);
        ctx.fillStyle = "white"; ctx.font = "28px sans-serif"; ctx.fillText("Score : " + score, canvas.width / 2, 280); ctx.fillText("Best : " + bestScore, canvas.width / 2, 320); ctx.textAlign = "left"; 
    }
    if (flashActive) { ctx.fillStyle = "rgba(255, 255, 255, 0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height); flashActive = false; }

    requestAnimationFrame(draw);
}

initStars();
draw();
</script>
</body>
</html>
