<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Infinite Stairs - Degu Edition</title>

<style>

html,body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameWrap{
    position:relative;
    width:min(100vw,500px);
}

canvas{
    display:block;
    width:100%;
    height:auto;
    background:#222;
    border:1px solid #555;
}

#controls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:flex;
    justify-content:space-between;

    padding:0 16px;
    box-sizing:border-box;
}

#gameOverControls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:none;
    justify-content:center;
}

button{

    width:120px;
    height:70px;

    border-radius:14px;

    border:2px solid rgba(255,255,255,.5);

    background:rgba(255,255,255,.15);

    color:white;

    font-size:24px;
    font-weight:bold;

    backdrop-filter:blur(4px);

    touch-action:manipulation;

    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

button:active{
    background:rgba(255,255,255,.3);
}

</style>
</head>
<body>

<div id="gameWrap">

    <canvas id="c"
            width="500"
            height="600"></canvas>

    <div id="controls">
        <button id="turnBtn">TURN</button>
        <button id="goBtn">GO</button>
    </div>

    <div id="gameOverControls">
        <button id="restartBtn">RESTART</button>
    </div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- ゲームバランス調整用の定数 ---
const POTATO_CHANCE = 0.05;      // さつまいもの出現確率
const CHAPPIE_CHANCE = 0.02;     // チャッピーの出現確率
const CHAPPIE_BONUS_SCORE = 30;  // チャッピーと合流した時の加算点
// -------------------------------------------

// --- 画像の読み込み ---
const deguLImg = new Image();
deguLImg.src = 'kuku_l.png';

const deguRImg = new Image();
deguRImg.src = 'kuku_r.png';

const potatoImg = new Image();
potatoImg.src = 'satsumaimo.png';

const chappieLImg = new Image();
chappieLImg.src = 'chappie_l.png';

const chappieRImg = new Image();
chappieRImg.src = 'chappie_r.png';
// --- 画像の読み込みここまで ---

let facing;
let score;
let bestScore;
let gameOver;
let path;
let potatoPath;

let chappiePath;       
let hasChappy;        
let lastPlayerX = 0;  

let previousStepX = 0;
let isJoiningTurn = false; 

let timeLeft;
let startTime;
let timeBonus = 0;

// 【新規追加】ハートエフェクト管理用の変数
let heartActive = false;
let heartStartTime = 0;
const HEART_DURATION = 600; // ハートが表示される時間（ミリ秒、600 = 0.6秒）

function updateButtons(){

    if(gameOver){

        document
            .getElementById("controls")
            .style.display = "none";

        document
            .getElementById("gameOverControls")
            .style.display = "flex";

    }else{

        document
            .getElementById("controls")
            .style.display = "flex";

        document
            .getElementById("gameOverControls")
            .style.display = "none";
    }
}

function reset(){

    bestScore =
        Number(
            localStorage.getItem("bestScore") || 0
        );

    facing = 1;
    score = 0;
    gameOver = false;

    timeLeft = 30;
    timeBonus = 0;
    startTime = Date.now();

    path = [0];
    potatoPath = [false];
    
    chappiePath = [false]; 
    hasChappy = false;
    lastPlayerX = 0;
    
    previousStepX = 0;
    isJoiningTurn = false; 

    // ハートをリセット
    heartActive = false;

    let chappiePlaced = false;

    for(let i=0;i<100;i++){

        const last = path[path.length-1];

        path.push(
            last +
            (Math.random()<0.5 ? -1 : 1)
        );

        potatoPath.push(Math.random() < POTATO_CHANCE);

        if (!chappiePlaced && i > 5 && Math.random() < CHAPPIE_CHANCE) {
            chappiePath.push(true);
            chappiePlaced = true;
        } else {
            chappiePath.push(false);
        }
    }

    updateButtons();
}

function finishGame(){

    if(score > bestScore){

        bestScore = score;

        localStorage.setItem(
            "bestScore",
            score
        );
    }

    gameOver = true;

    updateButtons();
}

function move(turn){

    if(gameOver){
        return;
    }

    let moveDir;

    if(turn){

        facing *= -1;
        moveDir = facing;

    }else{

        moveDir = facing;
    }

    lastPlayerX = path[0] - path[1];

    const dx = path[1] - path[0];

    if(dx !== moveDir){

        finishGame();
        return;
    }

    score++;

    previousStepX = path[0] - path[1];

    isJoiningTurn = false;

    path.shift();
    potatoPath.shift();
    chappiePath.shift(); 

    if (potatoPath[0]) {
        timeBonus += 3;
        potatoPath[0] = false;
    }

    if (chappiePath[0]) {
        score += CHAPPIE_BONUS_SCORE;         
        hasChappy = true;    
        isJoiningTurn = true;  
        chappiePath[0] = false; 

        // 【修正】チャッピーと合流した瞬間にハートエフェクトを開始
        heartActive = true;
        heartStartTime = Date.now();
    }

    const last =
        path[path.length-1];

    path.push(
        last +
        (Math.random()<0.5 ? -1 : 1)
    );

    potatoPath.push(Math.random() < POTATO_CHANCE);

    if (!hasChappy && !chappiePath.includes(true) && Math.random() < CHAPPIE_CHANCE) {
        chappiePath.push(true);
    } else {
        chappiePath.push(false);
    }
}

reset();

document.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        e.preventDefault();

        move(false);
    }
    else if(
        e.code==="ControlLeft" ||
        e.code==="ControlRight"
    ){

        move(true);
    }
});

const goBtn = document.getElementById("goBtn");
const turnBtn = document.getElementById("turnBtn");
const restartBtn = document.getElementById("restartBtn");

function attachButtonEvent(btn, callback) {
    btn.addEventListener("pointerdown", (e) => {
        e.preventDefault(); 
        callback();
    });
}

attachButtonEvent(goBtn, () => move(false));
attachButtonEvent(turnBtn, () => move(true));
attachButtonEvent(restartBtn, reset);

function drawImageWithScale(image, targetX, targetY, baseWidth, alignBottom = true) {
    if (!image.complete || image.naturalWidth === 0) return;
    
    const aspectRatio = image.naturalHeight / image.naturalWidth;
    const drawWidth = baseWidth;
    const drawHeight = baseWidth * aspectRatio;
    
    const x = targetX - drawWidth / 2;
    const y = alignBottom ? (targetY - drawHeight) : (targetY - drawHeight / 2);
    
    ctx.drawImage(image, x, y, drawWidth, drawHeight);
}

function getStairColor(currentScore) {
    const baseHue = 180; 
    const step = Math.floor(currentScore / 100);
    const hue = (baseHue + step * 60) % 360;
    return `hsl(${hue}, 100%, 50%)`;
}

// 【新規追加】プログラムでハートを描画する関数
function drawHeart(x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size / 4);
    // 左半分
    ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
    ctx.bezierCurveTo(x - size, y + size * 0.75, x, y + size * 1.1, x, y + size * 1.3);
    // 右半分
    ctx.bezierCurveTo(x, y + size * 1.1, x + size, y + size * 0.75, x + size, y + size / 4);
    ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
    ctx.closePath();
    ctx.fill();
}

function draw(){

    if(!gameOver){

        timeLeft =
            Math.max(
                0,
                30 + timeBonus -
                (
                    Date.now()
                    -
                    startTime
                ) / 1000
            );

        if(timeLeft <= 0){

            finishGame();
        }
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const centerX = 250;
    const playerY = 450; 

    const currentStairColor = getStairColor(score);

    const prevX = centerX + previousStepX * 50;
    const prevY = playerY + 40; 

    if (score > 0) {
        ctx.strokeStyle = currentStairColor;
        ctx.strokeRect(
            prevX - 25,
            prevY - 8,
            50,
            16
        );
    }

    // 階段の描画（通常の0〜11段）
    for(let i=0;i<12;i++){

        const x =
            centerX +
            (
                path[i]
                -
                path[0]
            ) * 50;

        const y =
            playerY
            -
            i * 40;

        ctx.strokeStyle = currentStairColor;

        ctx.strokeRect(
            x - 25,
            y - 8,
            50,
            16
        );

        // さつまい目の描画
        if (potatoPath[i]) {
            const itemSize = 24;
            ctx.drawImage(
                potatoImg,
                x - itemSize / 2,
                y - itemSize - 4,
                itemSize,
                itemSize
            );
        }

        // 階段の上で待っているチャッピー
        if (chappiePath[i]) {
            drawImageWithScale(chappieRImg, x, y + 8, 36, true);
        }
    }

    // チャッピーとククの描画処理（重ねる対応）
    const cImg = facing === -1 ? chappieLImg : chappieRImg;

    if (hasChappy) {
        if (isJoiningTurn) {
            drawImageWithScale(cImg, centerX, playerY + 8, 36, true);
        } else {
            drawImageWithScale(cImg, prevX, prevY + 8, 36, true);
        }
    }

    // プレイヤー（クク）の描画処理
    const pImg = facing === -1 ? deguLImg : deguRImg;
    const pSize = 48;

    ctx.drawImage(
        pImg,
        centerX - pSize / 2,
        playerY - pSize + 8,
        pSize,
        pSize
    );

    // --- 【新規追加】ハートエフェクトの描画ロジック ---
    if (heartActive) {
        const elapsed = Date.now() - heartStartTime;
        
        if (elapsed > HEART_DURATION) {
            heartActive = false; // 指定時間を過ぎたらエフェクト終了
        } else {
            // アニメーションの進行度（0.0 〜 1.0）
            const progress = elapsed / HEART_DURATION;
            
            // 進行度に応じて、徐々に上に昇らせる（-50px分）
            const heartY = (playerY - 45) - (progress * 50);
            
            // 進行度に応じて、フワッと現れてから完全に消えるように不透明度(Alpha)を計算
            // 前半でフェードイン、後半でフェードアウト
            let alpha = 1;
            if (progress < 0.2) {
                alpha = progress / 0.2; // 最初の20%の期間でフェードイン
            } else {
                alpha = 1 - (progress - 0.2) / 0.8; // 残りの80%の期間でフェードアウト
            }
            
            // 進行度に応じてサイズも少しだけ大きくする（ポップアップ感）
            const currentSize = 10 + progress * 8;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ff4a8d"; // かわいいピンクラベンダー色
            
            // ククとチャッピーの頭上（centerX）に描画
            drawHeart(centerX, heartY, currentSize);
            ctx.restore();
        }
    }
    // -------------------------------------------------

    // スコアなどの情報表示
    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";

    ctx.fillText(
        "Score: " + score,
        20,
        40
    );

    ctx.fillText(
        "Time: " +
        timeLeft.toFixed(1),
        20,
        75
    );

    ctx.fillText(
        "Best: " +
        bestScore,
        20,
        110
    );

    if(gameOver){

        ctx.fillStyle = "red";

        ctx.font =
            "40px sans-serif";

        ctx.fillText(
            "TIME UP",
            145,
            240
        );

        ctx.font =
            "28px sans-serif";

        ctx.fillText(
            "Score : " + score,
            160,
            290
        );

        ctx.fillText(
            "Best : " + bestScore,
            160,
            330
        );
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
