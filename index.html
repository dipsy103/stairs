<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Kuku's Stairs - Degu Edition</title>

<style>

html,body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameWrap{
    position:relative;
    width:min(100vw,500px);
}

canvas{
    display:block;
    width:100%;
    height:auto;
    background:#111526;
    border:1px solid #555;
}

#controls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:none;
    justify-content:space-between;

    padding:0 16px;
    box-sizing:border-box;
}

#startControls {
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:flex;
    justify-content:center;
}

#gameOverControls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:none;
    justify-content:center;
}

button{

    width:120px;
    height:70px;

    border-radius:14px;

    border:2px solid rgba(255,255,255,.5);

    background:rgba(255,255,255,.15);

    color:white;

    font-size:24px;
    font-weight:bold;

    backdrop-filter:blur(4px);

    touch-action:manipulation;

    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

button:active{
    background:rgba(255,255,255,.3);
}

</style>
</head>
<body>

<div id="gameWrap">

    <canvas id="c"
            width="500"
            height="600"></canvas>

    <div id="startControls">
        <button id="startBtn">START</button>
    </div>

    <div id="controls">
        <button id="turnBtn">TURN</button>
        <button id="goBtn">GO</button>
    </div>

    <div id="gameOverControls">
        <button id="restartBtn">RESTART</button>
    </div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- ゲームバランス調整用の定数 ---
const POTATO_CHANCE = 0.05;      // さつまいものの出現確率
const CHAPPIE_CHANCE = 0.01;     // チャッピーの出現確率
const CHAPPIE_BONUS_SCORE = 30;  // チャッピーと合流した時の加算点
const MAX_AHEAD_STAIRS = 20;     // 【新規】先読みする階段の長さ（100から20に変更）
// -------------------------------------------

// --- 画像の読み込み ---
const deguLImg = new Image();
deguLImg.src = 'kuku_l.png';

const deguRImg = new Image();
deguRImg.src = 'kuku_r.png';

const potatoImg = new Image();
potatoImg.src = 'satsumaimo.png';

const chappieLImg = new Image();
chappieLImg.src = 'chappie_l.png';

const chappieRImg = new Image();
chappieRImg.src = 'chappie_r.png';

// 【新規】ユーザー用意のシルエット画像
const silhouetteImg = new Image();
silhouetteImg.src = 'silhouette.png';
// --- 画像の読み込みここまで ---

let facing;
let score;
let bestScore;
let gameOver;
let isStarted = false; 
let gameOverReason = ""; 
let path;
let potatoPath;

let chappiePath;       
let hasChappy;        
let lastPlayerX = 0;  

let previousStepX = 0;
let isJoiningTurn = false; 

let timeLeft;
let startTime;
let timeBonus = 0;

let heartActive = false;
let heartStartTime = 0;
const HEART_DURATION = 600; 

let smokeActive = false;
let smokeStartTime = 0;
let smokeX = 0;
let smokeY = 0;
const SMOKE_DURATION = 500; 
let flashActive = false;    

// --- 背景エフェクト用の管理変数 ---
let bgStars = [];        
let shootingStar = null; 
const STAR_COUNT = 30;   
let targetScrollY = 0;   
let currentScrollY = 0;  

// さつまいも獲得時の黄色の光の粉用配列
let potatoParticles = [];

function initStars() {
    bgStars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        bgStars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,    
            speedFactor: Math.random() * 0.1 + 0.02 
        });
    }
    shootingStar = null;
    targetScrollY = 0;
    currentScrollY = 0;
    potatoParticles = []; 
}

// 【修正】手前のシルエット画像を縦横比維持・横幅いっぱいで最下部に描画する関数
function drawCitySilhouette() {
    if (!silhouetteImg.complete || silhouetteImg.naturalWidth === 0) return;

    ctx.save();
    // プレイヤーの移動に合わせて超低速（星の1/5の速度）で微かにスクロール（上空へ行く感覚の演出）
    let cityYOffset = (currentScrollY * 0.02);

    // 画像の元の縦横比から、Canvasの横幅（500px）に合わせた描画時の高さを計算
    const aspectRatio = silhouetteImg.naturalHeight / silhouetteImg.naturalWidth;
    const drawWidth = canvas.width; // 500
    const drawHeight = drawWidth * aspectRatio;

    // 画面の最下部を基準に、スクロールのオフセットを引いて配置
    const drawX = 0;
    const drawY = canvas.height - drawHeight + cityYOffset;

    ctx.drawImage(silhouetteImg, drawX, drawY, drawWidth, drawHeight);
    ctx.restore();
}

// さつまいもパーティクル発生（霧のように細かくきらめく）
function createPotatoParticles(x, y) {
    const count = 36; 
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2.5 + 0.8; 
        potatoParticles.push({
            x: x,
            y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 1.2, 
            size: Math.random() * 1.3 + 0.5,   
            life: 1.0,
            decay: Math.random() * 0.02 + 0.015 
        });
    }
}

function updateButtons(){
    if(!isStarted){
        document.getElementById("startControls").style.display = "flex";
        document.getElementById("controls").style.display = "none";
        document.getElementById("gameOverControls").style.display = "none";
    }
    else if(gameOver){
        document.getElementById("startControls").style.display = "none";
        document.getElementById("controls").style.display = "none";
        document.getElementById("gameOverControls").style.display = "flex";
    }else{
        document.getElementById("startControls").style.display = "none";
        document.getElementById("controls").style.display = "flex";
        document.getElementById("gameOverControls").style.display = "none";
    }
}

function initGame(autoStart = false) {
    bestScore = Number(localStorage.getItem("bestScore") || 0);
    score = 0;
    gameOver = false;
    gameOverReason = "";

    timeLeft = 30;
    timeBonus = 0;

    path = [0];
    potatoPath = [false];
    chappiePath = [false]; 
    hasChappy = false;
    lastPlayerX = 0;
    previousStepX = 0;
    isJoiningTurn = false; 
    heartActive = false;

    smokeActive = false;
    flashActive = false;

    initStars();

    for(let i=0; i < MAX_AHEAD_STAIRS; i++){
        const last = path[path.length-1];
        path.push(last + (Math.random()<0.5 ? -1 : 1));
        potatoPath.push(Math.random() < POTATO_CHANCE);

        if (i > 5 && !chappiePath.includes(true) && Math.random() < CHAPPIE_CHANCE) {
            chappiePath.push(true);
        } else {
            chappiePath.push(false);
        }
    }

    facing = path[1] - path[0];

    if (autoStart) {
        isStarted = true;
        startTime = Date.now();
    } else {
        isStarted = false;
    }

    updateButtons();
}

function startGame() {
    isStarted = true;
    startTime = Date.now();
    updateButtons();
}

function finishGame(reason){
    if(score > bestScore){
        bestScore = score;
        localStorage.setItem("bestScore", score);
    }
    gameOver = true;
    gameOverReason = reason; 
    updateButtons();
}

function move(turn){
    if(!isStarted || gameOver){
        return;
    }

    const prevFacing = facing;

    let moveDir;
    if(turn){
        facing *= -1;
        moveDir = facing;
    }else{
        moveDir = facing;
    }

    lastPlayerX = path[0] - path[1];
    const dx = path[1] - path[0];

    if(dx !== moveDir){
        if (hasChappy) {
            hasChappy = false;
            
            smokeActive = true;
            smokeStartTime = Date.now();
            smokeX = 250 + (path[0] - path[1]) * 50; 
            smokeY = 450 + 40;

            flashActive = true;

            facing = prevFacing;
            return; 
        } else {
            finishGame("MISS"); 
            return;
        }
    }

    score++;
    previousStepX = path[0] - path[1];
    isJoiningTurn = false;

    targetScrollY += 10; 

    path.shift();
    potatoPath.shift();
    chappiePath.shift(); 

    if (potatoPath[0]) {
        timeBonus += 3;
        const targetX = 250 + (path[0] - path[1]) * 50;
        createPotatoParticles(targetX, 450 - 15);
        potatoPath[0] = false;
    }

    if (chappiePath[0]) {
        score += CHAPPIE_BONUS_SCORE;         
        hasChappy = true;    
        isJoiningTurn = true;  
        chappiePath[0] = false; 

        heartActive = true;
        heartStartTime = Date.now();
    }

    const last = path[path.length-1];
    path.push(last + (Math.random()<0.5 ? -1 : 1));
    potatoPath.push(Math.random() < POTATO_CHANCE);

    if (!hasChappy && !chappiePath.includes(true) && Math.random() < CHAPPIE_CHANCE) {
        chappiePath.push(true);
    } else {
        chappiePath.push(false);
    }
}

initGame(false);

document.addEventListener("keydown",e=>{
    if(!isStarted && (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight")) {
        e.preventDefault();
        startGame();
        return;
    }

    if(gameOver && (e.code === "Space" || e.code === "ControlLeft" || e.code === "ControlRight")) {
        e.preventDefault();
        initGame(true);
        return;
    }

    if(e.code==="Space"){
        e.preventDefault();
        move(false);
    }
    else if(e.code==="ControlLeft" || e.code==="ControlRight"){
        move(true);
    }
});

const startBtn = document.getElementById("startBtn");
const goBtn = document.getElementById("goBtn");
const turnBtn = document.getElementById("turnBtn");
const restartBtn = document.getElementById("restartBtn");

function attachButtonEvent(btn, callback) {
    btn.addEventListener("pointerdown", (e) => {
        e.preventDefault(); 
        callback();
    });
}

attachButtonEvent(startBtn, startGame);
attachButtonEvent(goBtn, () => move(false));
attachButtonEvent(turnBtn, () => move(true));
attachButtonEvent(restartBtn, () => initGame(true)); 

function drawImageWithScale(image, targetX, targetY, baseWidth, alignBottom = true) {
    if (!image.complete || image.naturalWidth === 0) return;
    
    const aspectRatio = image.naturalHeight / image.naturalWidth;
    const drawWidth = baseWidth;
    const drawHeight = baseWidth * aspectRatio;
    
    const x = targetX - drawWidth / 2;
    const y = alignBottom ? (targetY - drawHeight) : (targetY - drawHeight / 2);
    
    ctx.drawImage(image, x, y, drawWidth, drawHeight);
}

function getStairColor(currentScore) {
    const baseHue = 180; 
    const step = Math.floor(currentScore / 100);
    const hue = (baseHue - step * 60 + 3600) % 360;
    return `hsl(${hue}, 100%, 50%)`;
}

function drawHeart(x, y, size) {
    ctx.beginPath();
    ctx.moveTo(x, y + size / 4);
    ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y + size / 4);
    ctx.bezierCurveTo(x - size, y + size * 0.75, x, y + size * 1.1, x, y + size * 1.3);
    ctx.bezierCurveTo(x, y + size * 1.1, x + size, y + size * 0.75, x + size, y + size / 4);
    ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y + size / 4);
    ctx.closePath();
    ctx.fill();
}

function drawSmokeCloud(x, y, progress) {
    ctx.save();
    ctx.fillStyle = "rgba(240, 240, 240, " + (1 - progress) + ")"; 
    
    const radius = 10 + progress * 25;
    const offset = progress * 20;

    ctx.beginPath();
    ctx.arc(x - offset, y, radius, 0, Math.PI * 2);
    ctx.arc(x + offset, y, radius, 0, Math.PI * 2);
    ctx.arc(x, y - offset, radius, 0, Math.PI * 2);
    ctx.arc(x, y + offset, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function draw(){

    if(isStarted && !gameOver){
        timeLeft = Math.max(0, 30 + timeBonus - (Date.now() - startTime) / 1000);
        if(timeLeft <= 0){
            finishGame("TIME_UP"); 
        }
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // ====== 背景の滑らかなイージングスクロール処理 ======
    let diff = targetScrollY - currentScrollY;
    currentScrollY += diff * 0.05; 

    // 【レイヤー1】一番奥に星空を描画
    ctx.save();
    bgStars.forEach(star => {
        let renderY = (star.y + currentScrollY * star.speedFactor) % canvas.height;
        if (renderY < 0) renderY += canvas.height; 

        const alpha = (star.speedFactor * 0.6) + (Math.random() * 0.3);
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(star.x, renderY, star.size, 0, Math.PI * 2);
        ctx.fill();
    });

    // 流れ星の抽選と描画
    if (isStarted && !gameOver) {
        if (!shootingStar && Math.random() < 0.001) {
            shootingStar = {
                x: Math.random() * canvas.width,
                y: Math.random() * (canvas.height / 2), 
                dx: -(Math.random() * 8 + 6),          
                dy: Math.random() * 8 + 6,             
                length: Math.random() * 40 + 30,       
                life: 1.0                              
            };
        }

        if (shootingStar) {
            shootingStar.x += shootingStar.dx;
            shootingStar.y += shootingStar.dy;
            shootingStar.life -= 0.04; 

            if (shootingStar.life <= 0 || shootingStar.x < 0 || shootingStar.y > canvas.height) {
                shootingStar = null; 
            } else {
                ctx.strokeStyle = `rgba(255, 255, 255, ${shootingStar.life})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(shootingStar.x, shootingStar.y);
                ctx.lineTo(shootingStar.x - shootingStar.dx * (shootingStar.length / 10), shootingStar.y - shootingStar.dy * (shootingStar.length / 10));
                ctx.stroke();
            }
        }
    }
    ctx.restore();

    // 【レイヤー2】星の上に「用意されたシルエット画像」を重ねて描画（星がビルを透過しなくなります）
    drawCitySilhouette();
    // ============================================================

    // 【レイヤー3】最手前のゲーム要素（階段やキャラクターなど）
    const centerX = 250;
    const playerY = 450; 

    const currentStairColor = getStairColor(score);
    const prevX = centerX + previousStepX * 50;
    const prevY = playerY + 40; 

    if (score > 0) {
        ctx.strokeStyle = currentStairColor;
        ctx.strokeRect(prevX - 25, prevY - 8, 50, 16);
    }

    // 階段の描画
    for(let i=0;i<12;i++){
        const x = centerX + (path[i] - path[0]) * 50;
        const y = playerY - i * 40;

        ctx.strokeStyle = currentStairColor;
        ctx.strokeRect(x - 25, y - 8, 50, 16);

        if (potatoPath[i]) {
            const itemSize = 24;
            ctx.drawImage(potatoImg, x - itemSize / 2, y - itemSize - 4, itemSize, itemSize);
        }

        if (chappiePath[i]) {
            drawImageWithScale(chappieRImg, x, y + 8, 36, true);
        }
    }

    // チャッピーとククの描画処理
    const cImg = facing === -1 ? chappieLImg : chappieRImg;
    if (hasChappy) {
        if (isJoiningTurn) {
            drawImageWithScale(cImg, centerX, playerY + 8, 36, true);
        } else {
            drawImageWithScale(cImg, prevX, prevY + 8, 36, true);
        }
    }

    // プレイヤー（クク）の描画処理
    const pImg = facing === -1 ? deguLImg : deguRImg;
    const pSize = 48;
    ctx.drawImage(pImg, centerX - pSize / 2, playerY - pSize + 8, pSize, pSize);

    // さつまいも獲得時の「黄色の光の粉」
    if (potatoParticles.length > 0) {
        ctx.save();
        for (let i = potatoParticles.length - 1; i >= 0; i--) {
            let p = potatoParticles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.08; 
            p.life -= p.decay;

            if (p.life <= 0) {
                potatoParticles.splice(i, 1);
            } else {
                ctx.fillStyle = `rgba(255, 235, 70, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        ctx.restore();
    }

    // ハートエフェクトの描画
    if (heartActive) {
        const elapsed = Date.now() - heartStartTime;
        if (elapsed > HEART_DURATION) {
            heartActive = false; 
        } else {
            const progress = elapsed / HEART_DURATION;
            const heartY = (playerY - 45) - (progress * 50);
            let alpha = progress < 0.2 ? progress / 0.2 : 1 - (progress - 0.2) / 0.8;
            const currentSize = 10 + progress * 8;

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ff4a8d"; 
            drawHeart(centerX, heartY, currentSize);
            ctx.restore();
        }
    }

    // 身代わりの煙エフェクトの描画
    if (smokeActive) {
        const elapsed = Date.now() - smokeStartTime;
        if (elapsed > SMOKE_DURATION) {
            smokeActive = false;
        } else {
            const progress = elapsed / SMOKE_DURATION;
            drawSmokeCloud(smokeX, smokeY - 15, progress);
        }
    }

    // スコアなどの情報表示
    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";
    ctx.fillText("Score: " + score, 20, 40);
    ctx.fillText("Time: " + timeLeft.toFixed(1), 20, 75);
    ctx.fillText("Best: " + bestScore, 20, 110);

    // タイトル画面
    if (!isStarted) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "cyan";
        ctx.font = "40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Kuku's Stairs", canvas.width / 2, 220);
        
        ctx.fillStyle = "white";
        ctx.font = "20px sans-serif";
        ctx.fillText("Press START to Play", canvas.width / 2, 280);
        ctx.textAlign = "left"; 
    }

    // ゲームオーバー画面
    if(gameOver){
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "red";
        ctx.font = "40px sans-serif";
        ctx.textAlign = "center";

        if (gameOverReason === "TIME_UP") {
            ctx.fillText("TIME UP", canvas.width / 2, 220);
        } else {
            ctx.fillText("GAME OVER", canvas.width / 2, 220);
        }

        ctx.fillStyle = "white";
        ctx.font = "28px sans-serif";
        ctx.fillText("Score : " + score, canvas.width / 2, 280);
        ctx.fillText("Best : " + bestScore, canvas.width / 2, 320);
        ctx.textAlign = "left"; 
    }

    if (flashActive) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        flashActive = false; 
    }

    requestAnimationFrame(draw);
}

initStars();
draw();

</script>

</body>
</html>
