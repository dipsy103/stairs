<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no">

<title>Infinite Stairs - Degu Edition</title>

<style>

html,body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#gameWrap{
    position:relative;
    width:min(100vw,500px);
}

canvas{
    display:block;
    width:100%;
    height:auto;
    background:#222;
    border:1px solid #555;
}

#controls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:flex;
    justify-content:space-between;

    padding:0 16px;
    box-sizing:border-box;
}

#gameOverControls{
    position:absolute;
    left:0;
    right:0;
    bottom:16px;

    display:none;
    justify-content:center;
}

button{

    width:120px;
    height:70px;

    border-radius:14px;

    border:2px solid rgba(255,255,255,.5);

    background:rgba(255,255,255,.15);

    color:white;

    font-size:24px;
    font-weight:bold;

    backdrop-filter:blur(4px);

    touch-action:manipulation;
}

button:active{
    background:rgba(255,255,255,.3);
}

</style>
</head>
<body>

<div id="gameWrap">

    <canvas id="c"
            width="500"
            height="600"></canvas>

    <div id="controls">
        <button id="turnBtn">TURN</button>
        <button id="goBtn">GO</button>
    </div>

    <div id="gameOverControls">
        <button id="restartBtn">RESTART</button>
    </div>

</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// --- 画像の読み込み ---
const deguLImg = new Image();
deguLImg.src = 'kuku_l.png';  // 左向き画像のパス

const deguRImg = new Image();
deguRImg.src = 'kuku_r.png';  // 右向き画像のパス

// 【新規追加】さつまいも画像の読み込み
const potatoImg = new Image();
potatoImg.src = 'satsumaimo.png';
// --- 画像の読み込みここまで ---

let facing;
let score;
let bestScore;
let gameOver;
let path;
let potatoPath; // 【新規追加】さつまいもの位置を記録する配列

let timeLeft;
let startTime;
let timeBonus = 0; // 【新規追加】獲得したボーナス時間の合計秒数

function updateButtons(){

    if(gameOver){

        document
            .getElementById("controls")
            .style.display = "none";

        document
            .getElementById("gameOverControls")
            .style.display = "flex";

    }else{

        document
            .getElementById("controls")
            .style.display = "flex";

        document
            .getElementById("gameOverControls")
            .style.display = "none";
    }
}

function reset(){

    bestScore =
        Number(
            localStorage.getItem("bestScore") || 0
        );

    facing = 1;
    score = 0;
    gameOver = false;

    timeLeft = 30;
    timeBonus = 0; // ボーナス時間をリセット
    startTime = Date.now();

    path = [0];
    potatoPath = [false]; // 最初のスタート地点にはさつまいもは置かない

    for(let i=0;i<100;i++){

        const last = path[path.length-1];

        path.push(
            last +
            (Math.random()<0.5 ? -1 : 1)
        );

        // 【新規追加】20%の確率でさつまいもを出現させる
        potatoPath.push(Math.random() < 0.05);
    }

    updateButtons();
}

function finishGame(){

    if(score > bestScore){

        bestScore = score;

        localStorage.setItem(
            "bestScore",
            score
        );
    }

    gameOver = true;

    updateButtons();
}

function move(turn){

    if(gameOver){
        return;
    }

    let moveDir;

    if(turn){

        facing *= -1;
        moveDir = facing;

    }else{

        moveDir = facing;
    }

    const dx = path[1] - path[0];

    if(dx !== moveDir){

        finishGame();
        return;
    }

    score++;

    path.shift();
    potatoPath.shift(); // プレイヤーの一歩進捗に合わせてさつまいもデータもシフト

    // 【新規追加】進んだ先の階段（インデックス0）にさつまいもがあれば取得
    if (potatoPath[0]) {
        timeBonus += 3; // ボーナス時間を3秒追加
        potatoPath[0] = false; // 取ったので消す
    }

    const last =
        path[path.length-1];

    path.push(
        last +
        (Math.random()<0.5 ? -1 : 1)
    );

    // 【新規追加】新しく生成される先の階段にも20%の確率でさつまいもを配置
    potatoPath.push(Math.random() < 0.20);
}

reset();

document.addEventListener("keydown",e=>{

    if(e.code==="Space"){

        e.preventDefault();

        move(false);
    }
    else if(
        e.code==="ControlLeft" ||
        e.code==="ControlRight"
    ){

        move(true);
    }
});

document
.getElementById("goBtn")
.addEventListener(
    "click",
    ()=>move(false)
);

document
.getElementById("turnBtn")
.addEventListener(
    "click",
    ()=>move(true)
);

document
.getElementById("restartBtn")
.addEventListener(
    "click",
    reset
);

function draw(){

    if(!gameOver){

        // 【修正】経過時間からボーナス時間を引くことで、残り時間を実質的に増やします
        timeLeft =
            Math.max(
                0,
                30 + timeBonus -
                (
                    Date.now()
                    -
                    startTime
                ) / 1000
            );

        if(timeLeft <= 0){

            finishGame();
        }
    }

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const centerX = 250;
    const playerY = 450;

    // 階段の描画
    for(let i=0;i<12;i++){

        const x =
            centerX +
            (
                path[i]
                -
                path[0]
            ) * 50;

        const y =
            playerY
            -
            i * 40;

        ctx.strokeStyle = "cyan";

        ctx.strokeRect(
            x - 25,
            y - 8,
            50,
            16
        );

        // 【新規追加】さつまいもの描画処理
        // その階段（i番目）にさつまいもフラグ（true）が立っていれば画像を描画
        // ※プレイヤーがいる最初の階段（i=0）の芋はmove内で即時回収されるため基本表示されません
        if (potatoPath[i]) {
            const itemSize = 24; // さつまいもの表示サイズ（24x24ピクセル）
            ctx.drawImage(
                potatoImg,
                x - itemSize / 2,     // 階段の横中央
                y - itemSize - 4,     // 階段の少し上
                itemSize,
                itemSize
            );
        }
    }

    // 画像の描画処理
    const pImg = facing === -1 ? deguLImg : deguRImg;
    const pSize = 48;

    ctx.drawImage(
        pImg,
        centerX - pSize / 2,
        playerY - pSize + 8,
        pSize,
        pSize
    );

    // スコアなどの情報表示
    ctx.fillStyle = "white";
    ctx.font = "24px sans-serif";

    ctx.fillText(
        "Score: " + score,
        20,
        40
    );

    ctx.fillText(
        "Time: " +
        timeLeft.toFixed(1),
        20,
        75
    );

    ctx.fillText(
        "Best: " +
        bestScore,
        20,
        110
    );

    if(gameOver){

        ctx.fillStyle = "red";

        ctx.font =
            "40px sans-serif";

        ctx.fillText(
            "TIME UP",
            145,
            240
        );

        ctx.font =
            "28px sans-serif";

        ctx.fillText(
            "Score : " + score,
            160,
            290
        );

        ctx.fillText(
            "Best : " + bestScore,
            160,
            330
        );
    }

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
